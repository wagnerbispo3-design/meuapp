<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucro Fácil - WR Acessórios</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #22c55e;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text-main); padding-bottom: 110px; }

        /* Estilo Cabeçalho Original */
        .header-green {
            background: #22c55e;
            padding: 40px 20px 60px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            color: white;
        }
        .header-green h1 { font-size: 32px; font-weight: 800; }
        .filter-bar { display: flex; gap: 8px; margin-top: 15px; }
        .filter-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .filter-btn.active { background: white; color: var(--primary); }

        .container { padding: 0 15px; margin-top: -30px; }

        .btn-venda-principal {
            background: var(--card-bg); color: var(--primary); border: none; padding: 20px; border-radius: 20px;
            width: 100%; font-size: 18px; font-weight: 800; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px; cursor: pointer; border: 1px solid var(--border);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 17px; font-weight: 800; margin-top: 5px; display: block; }

        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        #home.page.active { padding: 0; }

        .item-card { background: var(--card-bg); border-radius: 18px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        /* NOVO: Modal de Seleção de Produto (Substitui o Prompt) */
        #modal-selecao { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.7); z-index:2000; flex-direction: column; justify-content: flex-end; 
        }
        .modal-venda-content { 
            background: white; border-top-left-radius: 30px; border-top-right-radius: 30px; 
            padding: 25px; max-height: 80vh; overflow-y: auto; 
        }
        .venda-item-btn { 
            width: 100%; padding: 15px; background: #f8fafc; border: 1px solid var(--border); 
            border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; 
            align-items: center; text-align: left; font-size: 16px;
        }

        /* Barra de Navegação Original */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); display: flex; padding: 10px 0 25px 0; z-index: 100; }
        .nav-item { background: none; border: none; color: #94a3b8; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        input { width:100%; padding: 15px; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; font-size: 16px; }
        .btn-confirm { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="modal-selecao" onclick="if(event.target==this) fecharVenda()">
        <div class="modal-venda-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h3 id="titulo-venda-contexto">Selecionar Produto</h3>
                <button onclick="fecharVenda()" style="background:none; border:none; font-size:28px; color:var(--text-sub)">&times;</button>
            </div>
            <input type="text" id="searchVenda" placeholder="🔍 Buscar produto..." onkeyup="renderSelecaoVenda()">
            <div id="lista-selecao-venda"></div>
        </div>
    </div>

    <div id="home" class="page active">
        <div class="header-green">
            <p>Lucro (Hoje) 💰</p>
            <h1 id="liq-home">R$ 0,00</h1>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="setPeriodo(1, this)">Hoje</button>
                <button class="filter-btn" onclick="setPeriodo(7, this)">7 Dias</button>
                <button class="filter-btn" onclick="setPeriodo(30, this)">30 Dias</button>
            </div>
        </div>
        <div class="container">
            <button class="btn-venda-principal" onclick="abrirSelecaoVenda('venda')">+ Realizar Venda</button>
            
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">Vendas Totais</span><span id="bruto-home" class="stat-value" style="color:var(--primary)">R$ 0,00</span></div>
                <div class="stat-card"><span class="stat-label">Gastos</span><span id="desp-home" class="stat-value" style="color:var(--danger)">R$ 0,00</span></div>
            </div>

            <div style="background:white; border-radius:20px; padding:15px; border:1px solid var(--border)">
                <p class="stat-label" style="margin-bottom:10px">Desempenho</p>
                <canvas id="vendasChart" height="150"></canvas>
            </div>
        </div>
    </div>

    <div id="produtos" class="page">
        <h2>Gerenciar Estoque</h2>
        <button class="btn-confirm" style="margin: 20px 0" onclick="novoProduto()">+ Novo Produto</button>
        <div id="lista-estoque"></div>
    </div>

    <div id="fiado" class="page">
        <h2>Fiados Pendentes</h2>
        <button class="btn-confirm" style="background:var(--warning); margin: 20px 0" onclick="abrirSelecaoVenda('fiado')">+ Registrar Fiado</button>
        <div id="lista-fiado"></div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="tab('home', this)"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Início</button>
        <button class="nav-item" onclick="tab('produtos', this)"><svg viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M3 9h18M9 21V9"></path></svg>Estoque</button>
        <button class="nav-item" onclick="tab('fiado', this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>Fiados</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('lucro_facil_v17')) || { produtos: [], logs: [], fiados: [] };
        let periodoDias = 1; let myChart = null; let contextoVenda = 'venda';

        function save() { localStorage.setItem('lucro_facil_v17', JSON.stringify(db)); render(); }

        /* LÓGICA DE SELEÇÃO VISUAL (SUBSTITUI O PROMPT) */
        function abrirSelecaoVenda(tipo) {
            if(db.produtos.length === 0) return alert("Adicione produtos no estoque primeiro!");
            contextoVenda = tipo;
            document.getElementById('titulo-venda-contexto').innerText = tipo === 'venda' ? 'Vender Produto' : 'Registrar Fiado';
            document.getElementById('modal-selecao').style.display = 'flex';
            document.getElementById('searchVenda').value = "";
            renderSelecaoVenda();
        }

        function fecharVenda() { document.getElementById('modal-selecao').style.display = 'none'; }

        function renderSelecaoVenda() {
            const termo = document.getElementById('searchVenda').value.toLowerCase();
            const lista = document.getElementById('lista-selecao-venda');
            lista.innerHTML = "";
            db.produtos.forEach((p, i) => {
                if(p.nome.toLowerCase().includes(termo)) {
                    lista.innerHTML += `
                        <button class="venda-item-btn" onclick="executarAcao(${i})">
                            <span><b>${p.nome}</b><br><small>Estoque: ${p.qtd}</small></span>
                            <b style="color:var(--primary)">R$ ${p.venda.toFixed(2)}</b>
                        </button>`;
                }
            });
        }

        function executarAcao(idx) {
            let p = db.produtos[idx];
            if(p.qtd <= 0) return alert("Sem estoque!");

            if(contextoVenda === 'venda') {
                p.qtd--;
                db.logs.push({ t:'v', n: p.nome, v: p.venda, custo: p.custo, dataIso: new Date().toISOString() });
                fecharVenda(); save();
            } else {
                let cliente = prompt("Nome do cliente:");
                if(cliente) {
                    p.qtd--;
                    db.fiados.push({ cliente, item: p.nome, valor: p.venda, custo: p.custo });
                    fecharVenda(); save();
                }
            }
        }

        /* FUNÇÕES DE RENDERIZAÇÃO ORIGINAIS */
        function render() {
            const fmt = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            let fat = 0, custoT = 0, despT = 0;
            db.logs.forEach(l => {
                if(l.t === 'v') { fat += l.v; custoT += l.custo; } else { despT += l.v; }
            });
            document.getElementById('bruto-home').innerText = fmt(fat);
            document.getElementById('desp-home').innerText = fmt(despT);
            document.getElementById('liq-home').innerText = fmt(fat - (custoT + despT));

            const listEst = document.getElementById('lista-estoque');
            if(listEst) {
                listEst.innerHTML = db.produtos.map((p, i) => `
                    <div class="item-card">
                        <div><b>${p.nome}</b><br><small>${p.qtd} un | Venda: ${fmt(p.venda)}</small></div>
                        <button onclick="removerProduto(${i})" style="background:none; border:none;">🗑️</button>
                    </div>`).join("");
            }

            const listFi = document.getElementById('lista-fiado');
            if(listFi) {
                listFi.innerHTML = db.fiados.map((f, i) => `
                    <div class="item-card">
                        <div><b>${f.cliente}</b><br><small>${f.item} - ${fmt(f.valor)}</small></div>
                        <button class="btn-confirm" style="width:auto; padding:10px" onclick="baixarFiado(${i})">PAGO</button>
                    </div>`).join("");
            }
            updateChart();
        }

        function tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function novoProduto() {
            const nome = prompt("Nome:");
            const custo = parseFloat(prompt("Custo R$:"));
            const venda = parseFloat(prompt("Venda R$:"));
            const qtd = parseInt(prompt("Qtd:"));
            if(nome && venda) { db.produtos.push({nome, custo, venda, qtd}); save(); }
        }

        function removerProduto(i) { if(confirm("Remover?")) { db.produtos.splice(i,1); save(); } }

        function baixarFiado(i) {
            let f = db.fiados[i];
            db.logs.push({ t:'v', n: "Fiado: "+f.cliente, v: f.valor, custo: f.custo, dataIso: new Date().toISOString() });
            db.fiados.splice(i,1); save();
        }

        function updateChart() {
            const ctx = document.getElementById('vendasChart'); if(!ctx) return;
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['S','T','Q','Q','S','S','D'], datasets: [{ data: [10,25,15,30,45,35,50], borderColor: '#22c55e', tension: 0.4 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        render();
    </script>
</body>
</html>
