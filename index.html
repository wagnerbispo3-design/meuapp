<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Lucro Fácil v17.9 - WR Acessórios</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #22c55e;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text-main); padding-bottom: 110px; }

        .header-green {
            background: #22c55e;
            padding: 40px 20px 60px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            color: white;
        }
        .header-green h1 { font-size: 32px; font-weight: 800; }
        .filter-bar { display: flex; gap: 8px; margin-top: 15px; }
        .filter-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .filter-btn.active { background: white; color: var(--primary); }

        .container { padding: 0 15px; margin-top: -30px; }

        .btn-venda-principal {
            background: var(--card-bg); color: var(--primary); border: none; padding: 20px; border-radius: 20px;
            width: 100%; font-size: 18px; font-weight: 800; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px; cursor: pointer; display: block; text-align: center; border: 1px solid var(--border);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; display: block; }
        .stat-value { font-size: 17px; font-weight: 800; margin-top: 5px; display: block; }

        .chart-container { background: white; border-radius: 20px; padding: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; font-size: 16px; outline: none; background: white; }

        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        #home.page.active { padding: 0; }

        .item-card { background: var(--card-bg); border-radius: 18px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-action { background: #f1f5f9; border: none; padding: 10px; border-radius: 12px; cursor: pointer; margin-left: 5px; }

        /* MODAL DE SELEÇÃO DE VENDA (NOVO) */
        #modal-selecao { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; flex-direction: column; justify-content: flex-end; }
        .modal-venda-content { background: white; border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .venda-item-btn { width: 100%; padding: 15px; background: #f8fafc; border: 1px solid var(--border); border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .venda-item-btn:active { background: #e2e8f0; }

        /* NAVEGAÇÃO */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); display: flex; padding: 10px 0 25px 0; z-index: 100; }
        .nav-item { background: none; border: none; color: #94a3b8; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        /* MODAL CADASTRO */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; }
        input { width:100%; padding: 15px; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; font-size: 16px; }
        .btn-confirm { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="modal-selecao" onclick="if(event.target==this) fecharVenda()">
        <div class="modal-venda-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h3 id="titulo-venda-contexto">Selecionar Produto</h3>
                <button onclick="fecharVenda()" style="background:none; border:none; font-size:24px; color:var(--text-sub)">&times;</button>
            </div>
            <input type="text" id="searchVenda" class="search-box" placeholder="🔍 Buscar para vender..." onkeyup="renderSelecaoVenda()">
            <div id="lista-selecao-venda"></div>
        </div>
    </div>

    <div id="modal" onclick="if(event.target==this) fecharModal()">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom:20px">Produto</h3>
            <input type="hidden" id="edit-index">
            <input type="text" id="p-nome" placeholder="Nome do Produto">
            <input type="number" id="p-custo" placeholder="Custo R$">
            <input type="number" id="p-venda" placeholder="Venda R$">
            <input type="number" id="p-qtd" placeholder="Qtd em Estoque">
            <button class="btn-confirm" onclick="salvarProduto()">Salvar Produto</button>
        </div>
    </div>

    <div id="home" class="page active">
        <div class="header-green">
            <p id="label-periodo">Lucro (Hoje) 💰</p>
            <h1 id="liq-home">R$ 0,00</h1>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="setPeriodo(1, this)">Hoje</button>
                <button class="filter-btn" onclick="setPeriodo(7, this)">7 Dias</button>
                <button class="filter-btn" onclick="setPeriodo(30, this)">30 Dias</button>
            </div>
        </div>
        <div class="container">
            <button class="btn-venda-principal" onclick="abrirSelecaoVenda('venda')">+ Realizar Venda</button>
            
            <div class="chart-container">
                <p class="stat-label" style="margin-bottom:10px">Vendas (Últimos 7 dias)</p>
                <canvas id="vendasChart" height="150"></canvas>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">Vendas Totais</span><span id="bruto-home" class="stat-value" style="color:var(--primary)">R$ 0,00</span></div>
                <div class="stat-card"><span class="stat-label">Gastos</span><span id="desp-home" class="stat-value" style="color:var(--danger)">R$ 0,00</span></div>
            </div>
        </div>
    </div>

    <div id="produtos" class="page">
        <h2 style="margin-bottom:15px">Estoque</h2>
        <input type="text" id="searchEstoque" class="search-box" placeholder="🔍 Buscar no estoque..." onkeyup="render()">
        <button class="btn-confirm" style="margin-bottom:20px" onclick="abrirModal()">+ Novo Produto</button>
        <div id="lista-estoque"></div>
    </div>

    <div id="vendas-page" class="page"><h2>Vendas</h2><div id="lista-vendas"></div></div>
    <div id="fiado" class="page">
        <h2>Fiados</h2>
        <button class="btn-confirm" style="background:var(--warning); margin-bottom:20px" onclick="abrirSelecaoVenda('fiado')">+ Registrar Fiado</button>
        <div id="lista-fiado"></div>
    </div>
    <div id="gastos-page" class="page">
        <h2>Gastos</h2>
        <div class="stats-grid" style="margin-top:15px"><div class="stat-card"><span class="stat-label">Investido</span><span id="invest-total" class="stat-value">R$ 0,00</span></div><div class="stat-card"><span class="stat-label">Potencial</span><span id="venda-estoque-total" class="stat-value">R$ 0,00</span></div></div>
        <button class="btn-confirm" style="background:var(--danger); margin-bottom:20px" onclick="novaDespesa()">+ Lançar Gasto</button>
        <div id="lista-desp"></div>
    </div>
    <div id="config" class="page">
        <h2>Ajustes</h2>
        <button class="btn-confirm" style="background:#1e293b; margin-bottom:10px" onclick="exportarBackup()">Baixar Backup</button>
        <button class="btn-confirm" style="background:var(--danger)" onclick="reset()">Zerar Tudo</button>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="tab('home', this)"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Início</button>
        <button class="nav-item" onclick="tab('produtos', this)"><svg viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M3 9h18M9 21V9"></path></svg>Estoque</button>
        <button class="nav-item" onclick="tab('vendas-page', this)"><svg viewBox="0 0 24 24"><path d="M12 20v-6M6 20V10M18 20V4"></path></svg>Vendas</button>
        <button class="nav-item" onclick="tab('fiado', this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>Fiados</button>
        <button class="nav-item" onclick="tab('gastos-page', this)"><svg viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"></rect><line x1="2" x2="22" y1="10" y2="10"></line></svg>Gastos</button>
        <button class="nav-item" onclick="tab('config', this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H22a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('lucro_facil_v17')) || { produtos: [], logs: [], fiados: [] };
        let periodoDias = 1; let myChart = null; let contextoVenda = 'venda';

        function tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); render();
        }

        function setPeriodo(dias, btn) {
            periodoDias = dias; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); render();
        }

        function save() { localStorage.setItem('lucro_facil_v17', JSON.stringify(db)); render(); }

        /* NOVA LÓGICA DE SELEÇÃO VISUAL DE VENDA */
        function abrirSelecaoVenda(tipo) {
            if(!db.produtos.length) return alert("Adicione produtos no estoque primeiro!");
            contextoVenda = tipo;
            document.getElementById('titulo-venda-contexto').innerText = tipo === 'venda' ? 'Realizar Venda' : 'Registrar Fiado';
            document.getElementById('modal-selecao').style.display = 'flex';
            document.getElementById('searchVenda').value = "";
            renderSelecaoVenda();
        }

        function fecharVenda() { document.getElementById('modal-selecao').style.display = 'none'; }

        function renderSelecaoVenda() {
            const termo = document.getElementById('searchVenda').value.toLowerCase();
            const lista = document.getElementById('lista-selecao-venda');
            lista.innerHTML = "";
            db.produtos.forEach((p, i) => {
                if(p.nome.toLowerCase().includes(termo)) {
                    lista.innerHTML += `
                        <button class="venda-item-btn" onclick="confirmarAcaoVenda(${i})">
                            <div>
                                <b>${p.nome}</b><br>
                                <small>Estoque: ${p.qtd} un</small>
                            </div>
                            <b style="color:var(--primary)">R$ ${p.venda.toFixed(2)}</b>
                        </button>`;
                }
            });
        }

        function confirmarAcaoVenda(idx) {
            let p = db.produtos[idx];
            if(p.qtd <= 0) return alert("Produto sem estoque!");

            if(contextoVenda === 'venda') {
                if(confirm(`Vender 1x ${p.nome}?`)) {
                    p.qtd--;
                    db.logs.push({ t:'v', n: p.nome, v: p.venda, custo: p.custo, dataIso: new Date().toISOString() });
                    fecharVenda(); save();
                }
            } else {
                const cliente = prompt("Nome do cliente:");
                if(cliente) {
                    const data = prompt("Data de pagamento:", "05/06");
                    p.qtd--;
                    db.fiados.push({ cliente: cliente, item: p.nome, valor: p.venda, custo: p.custo, dataPagto: data });
                    fecharVenda(); save();
                }
            }
        }

        function render() {
            const fmt = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            const agora = new Date();
            let fat = 0, custoT = 0, despT = 0;
            db.logs.forEach(l => {
                const diff = (agora - new Date(l.dataIso)) / (1000*60*60*24);
                if (diff <= periodoDias) {
                    if(l.t === 'v') { fat += l.v; custoT += l.custo; } else { despT += l.v; }
                }
            });
            document.getElementById('bruto-home').innerText = fmt(fat);
            document.getElementById('desp-home').innerText = fmt(despT);
            document.getElementById('liq-home').innerText = fmt(fat - (custoT + despT));

            const listEst = document.getElementById('lista-estoque');
            const termoE = document.getElementById('searchEstoque')?.value.toLowerCase() || "";
            if(listEst) {
                listEst.innerHTML = "";
                db.produtos.forEach((p, i) => {
                    if(p.nome.toLowerCase().includes(termoE)) {
                        listEst.innerHTML += `<div class="item-card"><div><b>${p.nome}</b><br><small>${p.qtd} un | Venda: ${fmt(p.venda)}</small></div><div style="display:flex"><button class="btn-action" onclick="abrirModal(${i})">✏️</button></div></div>`;
                    }
                });
            }

            let sC = 0, sV = 0; db.produtos.forEach(p => { sC += (p.custo*p.qtd); sV += (p.venda*p.qtd); });
            if(document.getElementById('invest-total')) {
                document.getElementById('invest-total').innerText = fmt(sC);
                document.getElementById('venda-estoque-total').innerText = fmt(sV);
            }
            updateChart(); renderListas(fmt);
        }

        function renderListas(fmt) {
            const f = document.getElementById('lista-fiado');
            if(f) f.innerHTML = db.fiados.map((fi, i) => `<div class="item-card"><div><b>${fi.cliente}</b><br><small>${fi.item}</small></div><button class="btn-confirm" style="width:auto; padding:8px" onclick="baixarFiado(${i})">PAGO</button></div>`).join("");
            
            const v = document.getElementById('lista-vendas');
            if(v) v.innerHTML = db.logs.filter(l=>l.t==='v').reverse().slice(0,10).map(l=>`<div class="item-card"><div><b>${l.n}</b></div><b>+ ${fmt(l.v)}</b></div>`).join("");
        }

        function updateChart() {
            const ctx = document.getElementById('vendasChart'); if(!ctx) return;
            const labels = []; const data = [];
            for(let i=6; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate()-i);
                labels.push(d.toLocaleDateString('pt-BR', {weekday:'short'}));
                data.push(db.logs.filter(l=>l.t==='v' && new Date(l.dataIso).toDateString() === d.toDateString()).reduce((a,c)=>a+c.v, 0));
            }
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type:'line', data:{ labels, datasets:[{ data, borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,0.1)', fill:true, tension:0.4 }] }, options:{ plugins:{legend:{display:false}}, scales:{y:{display:false}, x:{grid:{display:false}}} } });
        }

        function abrirModal(index = -1) {
            const idx = document.getElementById('edit-index');
            if(index > -1) {
                const p = db.produtos[index];
                document.getElementById('p-nome').value = p.nome;
                document.getElementById('p-custo').value = p.custo;
                document.getElementById('p-venda').value = p.venda;
                document.getElementById('p-qtd').value = p.qtd;
                idx.value = index;
            } else { idx.value = -1; document.querySelectorAll('#modal input').forEach(i=>i.value=""); }
            document.getElementById('modal').style.display='flex';
        }
        function fecharModal() { document.getElementById('modal').style.display='none'; }
        function salvarProduto() {
            const idx = parseInt(document.getElementById('edit-index').value);
            const p = { nome: document.getElementById('p-nome').value, custo: parseFloat(document.getElementById('p-custo').value)||0, venda: parseFloat(document.getElementById('p-venda').value)||0, qtd: parseInt(document.getElementById('p-qtd').value)||0 };
            if(idx > -1) db.produtos[idx] = p; else db.produtos.push(p);
            save(); fecharModal();
        }
        function baixarFiado(i) {
            const fi = db.fiados[i];
            db.logs.push({ t:'v', n: 'Fiado: '+fi.cliente, v: fi.valor, custo: fi.custo, dataIso: new Date().toISOString() });
            db.fiados.splice(i,1); save();
        }
        function novaDespesa() {
            const n = prompt("Gasto:"); const v = parseFloat(prompt("Valor:"));
            if(n && v) { db.logs.push({ t:'d', n: n, v: v, dataIso: new Date().toISOString() }); save(); }
        }
        function exportarBackup() {
            const blob = new Blob([JSON.stringify(db)], {type:"application/json"});
            const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="backup_wr.json"; a.click();
        }
        function reset() { if(confirm("Apagar tudo?")) { db={produtos:[],logs:[],fiados:[]}; save(); } }

        render();
    </script>
</body>
</html>
